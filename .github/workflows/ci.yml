name: CI/CD — laximotech.ai

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Type-check + Lint ────────────────────────────────────────
  check:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate --schema=apps/api/prisma/schema.prisma
      - name: Show Prisma version
        run: npx prisma -v
      - name: Check generated Role export
        run: |
          grep -n "export const Role" node_modules/.prisma/client/index.d.ts || true
      - name: Check generated Role type
        run: |
          grep -n "export type Role" node_modules/.prisma/client/index.d.ts || true
      - name: Show runtime exports
        run: |
          node -e "const p=require('@prisma/client'); console.log(Object.keys(p).filter(x=>x.includes('Role')||x.includes('Course')||x.includes('Demo')||x.includes('Contact')))"

      - run: npm run type-check
      - run: npm run lint

  # ── Test NestJS API ──────────────────────────────────────────
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    needs: check
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     laximotech
          POSTGRES_PASSWORD: laximotech123
          POSTGRES_DB:       laximotech_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://laximotech:laximotech123@localhost:5432/laximotech_test
      JWT_SECRET:   ci-test-secret-key
      NODE_ENV:     test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run db:push
      # - run: npm test --workspace=apps/api

  # ── Build check ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check
    env:
      DATABASE_URL:    postgresql://dummy:dummy@localhost:5432/dummy
      AUTH_SECRET:     ci-auth-secret-32-chars-minimum-x
      NEXT_PUBLIC_API_URL: http://localhost:4000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx prisma generate --schema=apps/api/prisma/schema.prisma
      - run: npm run build
