# ============================================================
# railway.toml — NestJS API deployment on Railway
# ============================================================
[build]
builder    = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
startCommand    = "npm run start"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30
restartPolicyType  = "ON_FAILURE"

[[services]]
name = "laximotech-api"

[services.variables]
PORT     = "4000"
NODE_ENV = "production"
