services:
  postgres:
    image: postgres:16-alpine
    container_name: laximotech-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     laximotech
      POSTGRES_PASSWORD: laximotech123
      POSTGRES_DB:       laximotech
    ports:
      - "5433:5432"   # host 5433 → container 5432 (avoids conflict with local PG)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laximotech"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: laximotech-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@laximotech.ai
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"     # http://localhost:5050 → pgAdmin UI
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
